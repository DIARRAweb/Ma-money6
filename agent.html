<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<title>Agent MaliPay</title>

<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
font-family: Arial;
background:#f5f5f5;
text-align:center;
padding:20px;
}
#reader{
width:300px;
margin:auto;
}
.btn{
padding:12px;
margin:10px;
border:none;
border-radius:10px;
font-weight:bold;
cursor:pointer;
}
.deposit{background:green;color:white;}
.withdraw{background:red;color:white;}
</style>
</head>

<body>

<h2>📷 Scanner QR</h2>

<div id="reader"></div>

<h3 id="userInfo"></h3>

<button class="btn deposit" onclick="deposit()">💰 Dépôt</button>
<button class="btn withdraw" onclick="withdraw()">💸 Retrait</button>

<script>

const firebaseConfig = {
apiKey: "AIzaSyB2cVumUWZ_cDUC-kd7FUpUaXEODB1CCNE",
databaseURL: "https://ma-money5-default-rtdb.firebaseio.com"
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

let scannedUser = null;

/* 🔥 SCANNER */
function onScanSuccess(decodedText){
scannedUser = decodedText;

document.getElementById("userInfo").innerText =
"Utilisateur : " + decodedText;
}

new Html5QrcodeScanner("reader", {fps:10, qrbox:250})
.render(onScanSuccess);

/* 🔥 DEPOT */
window.deposit = async function(){

if(!scannedUser) return alert("Scanne un QR");

let amount = prompt("Montant dépôt");

let userRef = db.ref("users/" + scannedUser);
let agentRef = db.ref("agents/+22370000000");

let userSnap = await userRef.get();
let agentSnap = await agentRef.get();

let user = userSnap.val();
let agent = agentSnap.val();

if(agent.solde < amount){
alert("Solde agent insuffisant");
return;
}

agent.solde -= Number(amount);
user.solde += Number(amount);

await agentRef.update(agent);
await userRef.update(user);

alert("Dépôt effectué");

};

/* 🔥 RETRAIT */
window.withdraw = async function(){

if(!scannedUser) return alert("Scanne un QR");

let amount = prompt("Montant retrait");

let userRef = db.ref("users/" + scannedUser);
let agentRef = db.ref("agents/+22370000000");

let userSnap = await userRef.get();
let agentSnap = await agentRef.get();

let user = userSnap.val();
let agent = agentSnap.val();

if(user.solde < amount){
alert("Solde utilisateur insuffisant");
return;
}

user.solde -= Number(amount);
agent.solde += Number(amount);

await agentRef.update(agent);
await userRef.update(user);

alert("Retrait effectué");

};

</script>

</body>
</html>
