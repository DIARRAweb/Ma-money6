<!DOCTYPE html>
<html lang="fr">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta charset="UTF-8">
<title>Agent MaliPay</title>

<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js"></script>
<script src="https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js"></script>

<script src="https://unpkg.com/html5-qrcode"></script>

<style>
body{
margin:0;
font-family:"Segoe UI", sans-serif;
background: linear-gradient(135deg,#f5f7fa,#e4ecf7);
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
width:95%;
max-width:420px;
background:white;
padding:20px;
border-radius:20px;
box-shadow:0 15px 40px rgba(0,0,0,0.2);
animation:fadeUp 0.5s ease;
text-align:center;
}

@keyframes fadeUp{
from{opacity:0;transform:translateY(20px);}
to{opacity:1;transform:translateY(0);}
}

.title{
font-size:20px;
font-weight:bold;
margin-bottom:20px;
}

#reader{
width:100%;
border-radius:15px;
overflow:hidden;
margin-bottom:15px;
}

.actions{
display:flex;
gap:10px;
justify-content:center;
margin-top:15px;
}

button{
flex:1;
padding:12px;
border:none;
border-radius:12px;
font-weight:bold;
cursor:pointer;
font-size:15px;
transition:0.2s;
}

.deposit{
background: linear-gradient(45deg,#00c853,#00e676);
color:white;
}

.withdraw{
background: linear-gradient(45deg,#ff3d00,#ff1744);
color:white;
}

button:hover{
transform:scale(1.05);
}
</style>
</head>

<body>

<div class="container">

<div class="title">📷 Scanner QR</div>

<div id="agentBalance" style="margin-bottom:15px;font-weight:bold;"></div>

<button onclick="toggleScanner()" id="scanBtn">📷 Ouvrir Scanner</button>

<div id="reader" style="display:none;"></div>

<div id="result"></div>

<div class="actions">
<button class="deposit" onclick="startDeposit()">💰 Dépôt</button>
<button class="withdraw" onclick="startWithdraw()">💸 Retrait</button>
</div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-app.js";
import { getDatabase, ref, get, update, push } from "https://www.gstatic.com/firebasejs/12.12.0/firebase-database.js";

const firebaseConfig = {
apiKey: "AIzaSyB2cVumUWZ_cDUC-kd7FUpUaXEODB1CCNE",
databaseURL: "https://ma-money5-default-rtdb.firebaseio.com"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* ===== AGENT CONNECTÉ ===== */
let agent = JSON.parse(localStorage.getItem("loggedAgent"));

if(!agent){
alert("Accès refusé");
window.location.href="login.html";
}

async function loadAgentBalance(){

const snap = await get(ref(db,"agents/"+agent.phone));

if(snap.exists()){
const data = snap.val();
document.getElementById("agentBalance").innerText =
"💼 Solde : " + Number(data.solde).toLocaleString() + " FCFA";
}
}

loadAgentBalance();

/* ===== QR SCAN ===== */
let scannedUser = null;
let scannerRunning = false;
let html5QrCode = null;

function onScanSuccess(decodedText){
document.getElementById("result").innerText = "📱 "+decodedText;
scannedUser = decodedText;
}

window.toggleScanner = async function(){

const reader = document.getElementById("reader");
const btn = document.getElementById("scanBtn");

if(!scannerRunning){

reader.style.display = "block";
btn.innerText = "❌ Fermer Scanner";

html5QrCode = new Html5Qrcode("reader");

/* 🔥 caméra arrière */
const cameras = await Html5Qrcode.getCameras();

let backCamera = cameras.find(c =>
c.label.toLowerCase().includes("back")
) || cameras[0];

await html5QrCode.start(
backCamera.id,
{ fps: 10, qrbox: 250 },
onScanSuccess
);

scannerRunning = true;

}else{

await html5QrCode.stop();
reader.style.display = "none";
btn.innerText = "📷 Ouvrir Scanner";

scannerRunning = false;
}
};

/* ===== DEPOT ===== */
window.startDeposit = async function(){
if(!scannedUser){
alert("Scanne un QR d'abord");
return;
}

let amount = parseFloat(prompt("Montant dépôt ?"));

if(!amount || amount <= 0){
alert("Montant invalide");
return;
}

const userRef = ref(db,"users/"+scannedUser);
const agentRef = ref(db,"agents/"+agent.phone);

const userSnap = await get(userRef);
const agentSnap = await get(agentRef);

let userData = userSnap.val();
let agentData = agentSnap.val();

if(agentData.solde < amount){
alert("Solde agent insuffisant");
return;
}

agentData.solde -= amount;
userData.solde += amount;

await update(userRef,userData);
await update(agentRef,agentData);

alert("✅ Dépôt réussi");
loadAgentBalance();
};

/* ===== RETRAIT ===== */
/* ===== RETRAIT (DEMANDE SECURISEE) ===== */
window.startWithdraw = async function(){

if(!scannedUser){
alert("Scanne un QR d'abord");
return;
}

let amount = parseFloat(prompt("Montant retrait ?"));

if(!amount || amount <= 0){
alert("Montant invalide");
return;
}

/* 🔥 ENVOI DEMANDE AU USER */
const requestRef = ref(db,"withdrawRequests/"+scannedUser);
await push(requestRef,{
fromAgent: agent.phone, // 🔥 IMPORTANT (corrigé)
amount: amount,
fees: 0,
status: "pending",
date: new Date().toLocaleString()
});

alert("📩 Demande envoyée à l'utilisateur");

};
</script>

</body>
</html>
