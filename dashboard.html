<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, get, update, push, remove, onValue } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";
import { getStorage, ref as sRef, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-storage.js";
const firebaseConfig = {
  apiKey: "AIzaSyB2cVumUWZ_cDUC-kd7FUpUaXEODB1CCNE",
  authDomain: "ma-money5.firebaseapp.com",
  databaseURL: "https://ma-money5-default-rtdb.firebaseio.com",
  projectId: "ma-money5",
  storageBucket: "ma-money5.firebasestorage.app", // ✅ TRÈS IMPORTANT
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const storage = getStorage(app);

let currentUser = JSON.parse(localStorage.getItem("loggedUser"));
if(!currentUser) window.location.href="login.html";

const welcome=document.getElementById("welcome");
const soldeBox=document.getElementById("solde");
const messageBox=document.getElementById("message");
const profilePic = document.getElementById("profilePic");
const menuProfilePic = document.getElementById("menuProfilePic");
const menuUserName = document.getElementById("menuUserName");
const notifBox=document.getElementById("notifBox");
const notifBadge = document.getElementById("notifBadge");
const sendBtn=document.getElementById("sendBtn");
const receiverInput=document.getElementById("receiver");
const amountInput=document.getElementById("amount");
const conversionBox=document.getElementById("conversionBox");

welcome.innerText="👋Bienvenue "+currentUser.name;

let allUsers = [];

async function loadContacts(){
const snap = await get(ref(db,"users"));

if(snap.exists()){
allUsers = Object.values(snap.val());
}
}

loadContacts();

/* ===== MULTI DEVISE ===== */

const currencyMap={
"+223":{code:"XOF",symbol:"FCFA"},
"+33":{code:"EUR",symbol:"€"},
"+1515":{code:"USD",symbol:"$"},
"+1514":{code:"CAD",symbol:"$"},
"+226":{code:"XOF",symbol:"FCFA"},
"+227":{code:"XOF",symbol:"FCFA"},
"+86":{code:"SNY",symbol:"¥"}
};

function normalizePhone(phone){
return phone.replace(/\s+/g,'').replace(/[^+\d]/g,'');
}

function getCurrency(phone){
for(const p in currencyMap){
if(phone.startsWith(p)) return currencyMap[p];
}
return currencyMap["+223"];
}

/* =========================
🌍 PAYS / DRAPEAUX
========================= */
const countryMap = {
"+223":{flag:"🇲🇱", name:"Mali"},
"+33":{flag:"🇫🇷", name:"France"},
"+1515":{flag:"🇺🇸", name:"USA"},
"+1514":{flag:"🇨🇦", name:"Canada"}
};

function getCountry(phone){
for(const p in countryMap){
if(phone.startsWith(p)) return countryMap[p];
}
return {flag:"🌍", name:"Inconnu"};
}

async function getLiveRate(from,to){
if(from===to) return 1;
try{
const res=await fetch(`https://open.er-api.com/v6/latest/${from}`);
const data=await res.json();
if(data.result==="success" && data.rates[to]){
return data.rates[to];
}
return null;
}catch{
return null;
}
}

function formatMoney(a){ return Number(a).toLocaleString("fr-FR"); }

async function loadBalance(){
  const snap = await get(ref(db,"users/"+currentUser.phone));

  if(snap.exists()){
    currentUser = snap.val();
    localStorage.setItem("loggedUser", JSON.stringify(currentUser));

    const cur = getCurrency(currentUser.phone);
    if(localStorage.getItem("balanceVisible") === "false"){
      soldeBox.innerText = "••••••••";
      }else{
      soldeBox.innerText = formatMoney(currentUser.solde) + " " + cur.symbol;
      }

    // 🔥 PHOTO PROFIL
    let photoUrl = currentUser.photo
      ? currentUser.photo
      : "https://i.imgur.com/6VBx3io.png";

      profilePic.src = photoUrl;
      menuProfilePic.src = photoUrl;
      menuUserName.innerText = currentUser.name;
  }
}
loadBalance();

/* 🔄 synchroniser bouton */
const toggleBtn = document.getElementById("toggleBalance");

if(localStorage.getItem("balanceVisible") === "false"){
toggleBtn.innerText = "👁 Afficher";
}else{
toggleBtn.innerText = "👁 Masquer";
}

/* =============
============
🔒 ETAT DU SOLDE (PERSISTANT)
========================= */
let balanceVisible = localStorage.getItem("balanceVisible");

/* si jamais vide (première fois) */
if(balanceVisible === null){
balanceVisible = "true";
localStorage.setItem("balanceVisible","true");
}

document.getElementById("toggleBalance").onclick = async function(){

const isVisible = localStorage.getItem("balanceVisible");

if(isVisible === "true"){
/* 🔒 cacher */
localStorage.setItem("balanceVisible","false");
soldeBox.innerText = "••••••••";
this.innerText = "👁 Afficher";
}else{

/* 🔐 demander mot de passe */
const pass = prompt("Entrez votre mot de passe");

const snap = await get(ref(db,"users/"+currentUser.phone));

if(snap.exists() && snap.val().password === pass){

localStorage.setItem("balanceVisible","true");
loadBalance();
this.innerText = "👁 Masquer";

}else{
alert("❌ Mot de passe incorrect");
}
}
};



/* ===== CONVERSION LIVE VISUELLE ===== */

async function updateConversion(){
const receiverPhone=normalizePhone(receiverInput.value.trim());
const amount=parseFloat(amountInput.value);
if(!receiverPhone || !amount){ conversionBox.style.display="none"; return; }

const senderCur=getCurrency(currentUser.phone);
const receiverCur=getCurrency(receiverPhone);

const rate=await getLiveRate(senderCur.code,receiverCur.code);

/* ===== ENVOI ARGENT ===== */

window.sendMoney=async function(){

if(sendBtn.disabled) return;
sendBtn.disabled=true;
sendBtn.innerText="⏳Traitement...";

try{

const receiverPhone=normalizePhone(receiverInput.value.trim());
const amount=parseFloat(amountInput.value);
const reason=document.getElementById("reason").value.trim();
const scheduleDate=document.getElementById("scheduleDate").value;

if(!receiverPhone || amount<=0){
messageBox.innerText="❌Données invalides";
resetButton();return;
}

const senderSnap=await get(ref(db,"users/"+currentUser.phone));
const receiverSnap=await get(ref(db,"users/"+receiverPhone));
const treasurySnap=await get(ref(db,"treasury"));

if(!senderSnap.exists()||!receiverSnap.exists()){
messageBox.innerText="❌Compte introuvable";
resetButton();return;
}

let sender=senderSnap.val();
let receiverData=receiverSnap.val();
let treasury=treasurySnap.exists()?treasurySnap.val():{balance:0,rate:0.01};

if(sender.frozen){messageBox.innerText="❌Compte gelé";resetButton();return;}
if(receiverData.frozen){messageBox.innerText="❌Destinataire gelé";resetButton();return;}

const senderCur=getCurrency(sender.phone);
const receiverCur=getCurrency(receiverPhone);
const rate=await getLiveRate(senderCur.code,receiverCur.code);
if(!rate){messageBox.innerText="❌Impossible de récupérer le taux";resetButton();return;}

let convertedAmount=amount*rate;
let fee=amount*treasury.rate;
let total=amount+fee;

if(sender.solde<total){
messageBox.innerText="❌Solde insuffisant";
resetButton();return;
}

/* ===== TRANSFERT PROGRAMMÉ MULTI-DEVISE FIXÉ ===== */

if(scheduleDate){
await push(ref(db,"scheduledTransfers"),{
from:sender.phone,
to:receiverPhone,
amountOriginal:amount,
amountConverted:convertedAmount,
fee:fee,
rateUsed:rate,
senderCurrency:senderCur.code,
receiverCurrency:receiverCur.code,
reason,
scheduledFor:scheduleDate
});
messageBox.innerText="📅Transfert programmé";
resetForm();resetButton();return;
}

/* ===== TRANSFERT IMMÉDIAT ===== */

sender.solde-=total;
receiverData.solde+=convertedAmount;
treasury.balance+=fee;

await update(ref(db,"users/"+sender.phone),sender);
await update(ref(db,"users/"+receiverPhone),receiverData);
await update(ref(db,"treasury"),treasury);

const tx=await push(ref(db,"history/"+currentUser.phone),{
from:sender.phone,
to:receiverPhone,
amountOriginal:amount,
amountConverted:convertedAmount,
fee,
rateUsed:rate,
reason,
date:new Date().toLocaleString()
});

/* Notifications complètes avec réclamation */

await push(ref(db,"notifications/"+receiverPhone),{
title:"💰Argent reçu",
phone:sender.phone,
amount:convertedAmount,
reason,
date:new Date().toLocaleString(),
claimable:false,
seen:false
});

await push(ref(db,"history/"+receiverPhone),{
from:sender.phone,
to:receiverPhone,
amountOriginal:amount,
amountConverted:convertedAmount,
date:new Date().toLocaleString(),
type:"received"
});

await push(ref(db,"notifications/"+sender.phone),{
title:"📤Argent envoyé",
phone:receiverPhone,
amount:amount,
reason,
date:new Date().toLocaleString(),
claimable:true,
seen:false,
txId:tx.key
});

messageBox.innerText="✅Transfert réussi";
resetForm();loadBalance();loadNotifications();

}catch(e){
messageBox.innerText="❌Erreur : "+e.message;
}

resetButton();
};

/* ===============================
   MOTEUR TRANSFERT PROGRAMMÉ PRO
================================ */

async function processScheduledTransfers(){

const scheduledRef = ref(db,"scheduledTransfers");
const snapshot = await get(scheduledRef);

if(!snapshot.exists()) return;

const transfers = snapshot.val();
const now = Date.now();

for(const [id, tx] of Object.entries(transfers)){

if(tx.executed === true) continue;

if(!tx.scheduledFor) continue;

const scheduledTime = new Date(tx.scheduledFor).getTime();

if(now < scheduledTime) continue;

/* ===== Récupération comptes ===== */

const senderSnap = await get(ref(db,"users/"+tx.from));
const receiverSnap = await get(ref(db,"users/"+tx.to));
const treasurySnap = await get(ref(db,"treasury"));

if(!senderSnap.exists() || !receiverSnap.exists()){
console.log("Compte introuvable");
continue;
}

let sender = senderSnap.val();
let receiver = receiverSnap.val();
let treasury = treasurySnap.exists() ? treasurySnap.val() : {balance:0,rate:0.01};

/* ===== Vérifications sécurité ===== */

if(sender.frozen || receiver.frozen){
console.log("Compte gelé");
continue;
}

let totalDebit = tx.amountOriginal + tx.fee;

if(sender.solde < totalDebit){
console.log("Solde insuffisant");
continue;
}

/* ===== Débit / Crédit ===== */

sender.solde -= totalDebit;
receiver.solde += tx.amountConverted;
treasury.balance += tx.fee;

/* ===== Mise à jour comptes ===== */

await update(ref(db,"users/"+tx.from), sender);
await update(ref(db,"users/"+tx.to), receiver);
await update(ref(db,"treasury"), treasury);

/* ===== Historique transaction ===== */

const historyRef = await push(ref(db,"history"),{
from: tx.from,
to: tx.to,
amountOriginal: tx.amountOriginal,
amountConverted: tx.amountConverted,
fee: tx.fee,
rateUsed: tx.rateUsed,
reason: tx.reason,
date: new Date().toLocaleString(),
scheduled: true,
status: "executed"
});

/* ===== Notifications ===== */

await push(ref(db,"notifications/"+tx.to),{
title:"💰 Argent reçu (programmé)",
phone:tx.from,
amount:tx.amountConverted,
date:new Date().toLocaleString(),
claimable:false
});

await push(ref(db,"notifications/"+tx.from),{
title:"📤 Argent envoyé (programmé)",
phone:tx.to,
amount:tx.amountOriginal,
date:new Date().toLocaleString(),
claimable:true,
txId:historyRef.key
});

/* ===== Marquer exécuté ===== */

await update(ref(db,"scheduledTransfers/"+id),{
executed:true,
executedAt:Date.now()
});

}

}

/* Vérification toutes les 5 secondes */
processScheduledTransfers();
setInterval(processScheduledTransfers,5000);

from: tx.from,
to: tx.to,

date: tx.date,

createdAt: Date.now()
};

claimRequested:true
});

alert("Votre réclamation a été envoyée au service.");
};

function listenWithdrawRequests(){

const reqRef = ref(db,"withdrawRequests/"+currentUser.phone);

onValue(reqRef, async (snapshot)=>{

if(!snapshot.exists()) return;

const data = snapshot.val();

for(const id in data){

const req = data[id];
console.log("REQ =", req);

if(req.status !== "pending") continue;

/* 🔥 éviter double exécution */
await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"processing"
});

/* 🔐 CONFIRMATION */
const pass = prompt(
`💸 Demande de retrait
Montant : ${req.amount} FCFA
Frais : 0 FCFA
Entrez votre mot de passe`
);

if(!pass){
await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"pending"
});
return;
}

const userSnap = await get(ref(db,"users/"+currentUser.phone));
const user = userSnap.val();

if(user.password !== pass){
alert("❌ Mot de passe incorrect");

await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"pending"
});
return;
}

if(user.solde < req.amount){
alert("❌ Solde insuffisant");

await update(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id),{
status:"pending"
});
return;
}

/* ===== TRANSFERT ===== */
if(!req.fromAgent){
alert("❌ Agent introuvable");
return;
}

const agentRef = ref(db,"agents/"+req.fromAgent);
const agentSnap = await get(agentRef);

if(!agentSnap.exists()){
alert("❌ Agent inexistant");
return;
}

let agentData = agentSnap.val();

/* 🔥 conversion propre */
const amount = Number(req.amount);

user.solde -= amount;
agentData.solde += amount;

/* 🔥 update */
await update(ref(db,"users/"+currentUser.phone), {
...user,
solde: user.solde
});

await update(agentRef, {
...agentData,
solde: agentData.solde
});

/* ===== SUPPRIMER DEMANDE (IMPORTANT) ===== */
await remove(ref(db,"withdrawRequests/"+currentUser.phone+"/"+id));

alert("✅ Retrait confirmé");

loadBalance();

}
});
}
