<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Historique — MaliPay</title>

<style>
body { margin:0; font-family:Segoe UI; color:#111; }

#bg-video {
  position:fixed; inset:0;
  width:100%; height:100%;
  object-fit:cover;
  z-index:-2;
  filter:brightness(0.85);
}

body::before {
  content:"";
  position:fixed; inset:0;
  background:linear-gradient(135deg, rgba(255,140,0,0.35), rgba(255,90,0,0.25));
  z-index:-1;
}

header { text-align:center; font-size:26px; padding:18px; color:#ff9a00; font-weight:bold; }

.card {
  max-width:1100px;
  margin:18px auto;
  background:rgba(255,255,255,0.9);
  padding:18px;
  border-radius:18px;
  backdrop-filter: blur(18px);
  box-shadow:0 15px 35px rgba(0,0,0,0.35);
}

input {
  width:100%;
  padding:12px;
  border-radius:12px;
  border:1px solid #ccc;
  font-size:16px;
}

table {
  width:100%;
  border-collapse:collapse;
  margin-top:12px;
}

th, td {
  padding:12px;
  border-bottom:1px solid #eee;
  text-align:center;
}

th { background:#fff2e0; color:#ff7a00; }

button {
  padding:10px 14px;
  border-radius:10px;
  border:none;
  background:linear-gradient(45deg,#ff9a00,#ff6a00);
  color:white;
  font-weight:bold;
  cursor:pointer;
}

button:hover { transform:scale(1.05); }

.danger { background:crimson; }

.badge {
  padding:4px 8px;
  border-radius:8px;
  font-size:12px;
  font-weight:bold;
}

.badge-normal { background:#16a34a; color:white; }
.badge-claim { background:crimson; color:white; }
.badge-cancel { background:#64748b; color:white; }

.hidden { display:none; }
</style>
</head>

<body>

<video autoplay muted loop id="bg-video">
<source src="bg-admin.mp4">
</video>

<header>📜 Historique des transactions</header>

<div class="card">
<input id="searchHistory" placeholder="🔎 Rechercher par ID">
<button onclick="toggleHistory()">👁 Afficher / Masquer historique</button>
<div id="historyList" class="hidden"></div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
import { getDatabase, ref, get, update, remove, onValue, push } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-database.js";

const app = initializeApp({ databaseURL:"https://ma-money5-default-rtdb.firebaseio.com" });
const db = getDatabase(app);

const historyList = document.getElementById("historyList");
const searchInput = document.getElementById("searchHistory");

let cachedHistory = {};

window.toggleHistory = ()=> historyList.classList.toggle("hidden");

function generateID(date, amount){
const d = new Date(date || Date.now());

if(isNaN(d)) return "ID-INVALID";

let day = String(d.getDate()).padStart(2,"0");
let month = String(d.getMonth()+1).padStart(2,"0");
let year = d.getFullYear();

return `${day}.${month}.${year}.${amount}`;
}

onValue(ref(db,"history"), snap=>{
  cachedHistory = snap.val() || {};
  renderHistory();
});

searchInput.addEventListener("input", renderHistory);

async function renderHistory(){
  const search = searchInput.value.trim();
  let rows = "";

  for(const [key,h] of Object.entries(cachedHistory).reverse()){

    let id = h.customID;
const amount = h.amountOriginal ?? h.amountConverted ?? 0;

if(!id){
  id = generateID(h.date, amount);
  await update(ref(db,"history/"+key), { customID:id });
}

    if(search && !id.includes(search)) continue;

    let badge = `<span class="badge badge-normal">✔ Normal</span>`;
    if(h.cancelled) badge = `<span class="badge badge-cancel">↩ Annulée</span>`;
    else if(h.claimed) badge = `<span class="badge badge-claim">⚠ Réclamation</span>`;

    rows += `
    <tr>
      <td><b>${id}</b></td>
      <td>${h.from}</td>
      <td>➜</td>
      <td>${h.to}</td>
      <td><b>${(h.amountOriginal ?? h.amountConverted ?? 0).toLocaleString("fr-FR")} FCFA</b></td>
      <td>${h.date}</td>
      <td>${badge}</td>
      <td>
        <button onclick="cancelTransaction('${key}')">↩ Annuler</button>
        <button onclick="deleteHistory('${key}')" class="danger">🗑</button>
      </td>
    </tr>`;
  }

  historyList.innerHTML = `
  <table>
    <thead>
      <tr>
        <th>ID</th><th>Expéditeur</th><th></th><th>Destinataire</th>
        <th>Montant</th><th>Date</th><th>Statut</th><th>Actions</th>
      </tr>
    </thead>
    <tbody>${rows || "<tr><td colspan='8'>Aucun résultat</td></tr>"}</tbody>
  </table>`;
}

window.deleteHistory = async id=>{
  await remove(ref(db,"history/"+id));
};

// ✅ CANCEL + FULL REFUND SAFE
window.cancelTransaction = async historyID=>{
  const snap = await get(ref(db,"history/"+historyID));
  const h = snap.val();
  if(!h) return alert("❌ Transaction introuvable");
  if(h.cancelled) return alert("⚠ Déjà annulée");

  const senderSnap = await get(ref(db,"users/"+h.from));
  const receiverSnap = await get(ref(db,"users/"+h.to));

  let sender = senderSnap.val();
  let receiver = receiverSnap.val();

  if(!sender || !receiver) return alert("❌ Comptes introuvables");
  if(receiver.solde < h.amount) return alert("❌ Destinataire ne peut pas rembourser");

  receiver.solde -= h.amount;
  sender.solde += h.amount;

  await update(ref(db,"users/"+h.from), sender);
  await update(ref(db,"users/"+h.to), receiver);

  await update(ref(db,"history/"+historyID), {
    cancelled:true,
    claimed:true,
    refundDone:true,
    status:"Annulée"
  });

  await push(ref(db,"notifications/"+h.from), {
    title:"💸 Remboursement reçu",
    phone:h.to,
    amount:h.amount,
    date:new Date().toLocaleString()
  });

  alert("✅ Transaction annulée & argent remboursé !");
};
</script>
</body>
</html>
